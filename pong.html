<!DOCTYPE html>
<html>
<head>
  <title>Basic Pong HTML Game</title>
  <meta charset="UTF-8">
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }

    body {
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      border: 1px solid rgb(92, 92, 92);
    }
    .mini-container {
            position: sticky;
            top: 10px;
            width: 200px;
            padding: 20px;
            background-color: #ffe4e1;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            animation: bloom 5s infinite;
            z-index: 1000; /* Ensure it stays on top */
        }

        @keyframes bloom {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #ff69b4;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex; /* Flexbox for icon and text alignment */
            align-items: center; /* Center items vertically */
            justify-content: center; /* Center items horizontally */
        }

        .button:hover {
            background-color: #ff1493;
        }

        .button i {
            margin-right: 5px; /* Space between icon and text */
        }
   

.button i {
  margin-right: 5px; /* Space between icon and text */
}
.auth-buttons {
  display: flex;
  align-items: center;
}

.auth-button {
  background-color: #ffffff; /* Background color for the buttons */
  color: #ff7e5f; /* Text color */
  border: 2px solid #ff7e5f; /* Border color matching the theme */
  border-radius: 5px; /* Rounded corners */
  padding: 10px 15px; /* Padding for the buttons */
  margin-left: 20px; /* Space between the buttons and the search input */
  font-family: 'Montserrat', sans-serif; /* Use the same font as the links */
  font-size: 16px; /* Match the font size */
  cursor: pointer; /* Pointer cursor on hover */
  transition: background 0.3s ease, color 0.3s ease; /* Transition effects */
}

.auth-button:hover {
  background-color: rgba(255, 126, 95, 0.1); /* Light hover effect */
  color: #ffffff; /* Change text color on hover */
}

  </style>
</head>
<body>
  <div class="mini-container">
    <div class="title">Rina</div>
    <div class="button-container">
        <button class="button" onclick="location.href='main2.html'">Home</button>
        <button class="button" onclick="fetchGames()">Search</button>
    </div>
</div>
<canvas width="850" height="685" id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const context = canvas.getContext('2d');
const grid = 15;
const paddleHeight = grid * 5; // 80
const maxPaddleY = canvas.height - grid - paddleHeight;

var paddleSpeed = 6;
var ballSpeed = 5;

const leftPaddle = {
  x: grid * 2,
  y: canvas.height / 2 - paddleHeight / 2,
  width: grid,
  height: paddleHeight,
  dy: 0
};

const rightPaddle = {
  x: canvas.width - grid * 3,
  y: canvas.height / 2 - paddleHeight / 2,
  width: grid,
  height: paddleHeight,
  dy: 0
};

const ball = {
  x: canvas.width / 2,
  y: canvas.height / 2,
  width: grid,
  height: grid,
  resetting: false,
  dx: ballSpeed,
  dy: -ballSpeed
};

let leftScore = 0;
let rightScore = 0;

// Check for collision between two objects
function collides(obj1, obj2) {
  return obj1.x < obj2.x + obj2.width &&
         obj1.x + obj1.width > obj2.x &&
         obj1.y < obj2.y + obj2.height &&
         obj1.y + obj1.height > obj2.y;
}

// Draw scores
function drawScores() {
  context.fillStyle = 'red';
  context.font = '40px Arial';
  context.textAlign = 'center';
  context.fillText(leftScore, canvas.width / 4, 30);
  context.fillText(rightScore, (canvas.width / 4) * 3, 30);
}

// Game loop
function loop() {
  requestAnimationFrame(loop);
  context.clearRect(0, 0, canvas.width, canvas.height);

  // Move paddles by their velocity
  leftPaddle.y += leftPaddle.dy;
  rightPaddle.y += rightPaddle.dy;

  // Prevent paddles from going through walls
  leftPaddle.y = Math.max(grid, Math.min(leftPaddle.y, maxPaddleY));
  rightPaddle.y = Math.max(grid, Math.min(rightPaddle.y, maxPaddleY));

  // Draw paddles
  context.fillStyle = 'white';
  context.fillRect(leftPaddle.x, leftPaddle.y, leftPaddle.width, leftPaddle.height);
  context.fillRect(rightPaddle.x, rightPaddle.y, rightPaddle.width, rightPaddle.height);

  // Move ball by its velocity
  ball.x += ball.dx;
  ball.y += ball.dy;

  // Prevent ball from going through walls
  if (ball.y < grid) {
    ball.y = grid;
    ball.dy *= -1;
  } else if (ball.y + grid > canvas.height - grid) {
    ball.y = canvas.height - grid * 2;
    ball.dy *= -1;
  }

  // Reset ball if it goes past paddle
  if (ball.x < 0) {
    rightScore++;
    resetBall();
  } else if (ball.x > canvas.width) {
    leftScore++;
    resetBall();
  }

  // Check for paddle collisions
  if (collides(ball, leftPaddle)) {
    ball.dx *= -1;
    ball.x = leftPaddle.x + leftPaddle.width;
  } else if (collides(ball, rightPaddle)) {
    ball.dx *= -1;
    ball.x = rightPaddle.x - ball.width;
  }

  // Draw ball
  context.fillRect(ball.x, ball.y, ball.width, ball.height);

  // Draw walls
  context.fillStyle = 'white';
  context.fillRect(0, 0, canvas.width, grid);
  context.fillRect(0, canvas.height - grid, canvas.width, canvas.height);

  // Draw dotted line down the middle
  for (let i = grid; i < canvas.height - grid; i += grid * 2) {
    context.fillRect(canvas.width / 2 - grid / 2, i, grid, grid);
  }

  // Draw scores
  drawScores();
}

// Reset the ball to the center
function resetBall() {
  ball.resetting = true;
  ball.x = canvas.width / 2;
  ball.y = canvas.height / 2;
  ball.dx = ballSpeed * (Math.random() < 0.5 ? 1 : -1);
  ball.dy = ballSpeed * (Math.random() < 0.5 ? 1 : -1);
  setTimeout(() => {
    ball.resetting = false;
  }, 400);
}

// Listen to keyboard events to move the paddles
document.addEventListener('keydown', function(e) {
  if (e.which === 38) { // Up arrow
    rightPaddle.dy = -paddleSpeed;
  } else if (e.which === 40) { // Down arrow
    rightPaddle.dy = paddleSpeed;
  }
  if (e.which === 87) { // W key
    leftPaddle.dy = -paddleSpeed;
  } else if (e.which === 83) { // S key
    leftPaddle.dy = paddleSpeed;
  }
});

// Listen to keyboard events to stop the paddle if key is released
document.addEventListener('keyup', function(e) {
  if (e.which === 38 || e.which === 40) {
    rightPaddle.dy = 0;
  }
  if (e.which === 83 || e.which === 87) {
    leftPaddle.dy = 0;
  }
});


// Start the game
requestAnimationFrame(loop);
// Exit game function
document.getElementById('exit').addEventListener('click', function() {
  // Store the score with the current date and time
  const history = JSON.parse(localStorage.getItem('gameHistory')) || [];
  const newRecord = {
    name: "Memory Flip",  // Replace with your game's name
    date: new Date().toLocaleDateString(),
    time: new Date().toLocaleTimeString(),
    score: score
  };
  history.push(newRecord);
  localStorage.setItem('gameHistory', JSON.stringify(history));

  // Redirect to the main page
  window.location.href = 'main2.html'; // Redirect to your main page
});
</script>
</body>
</html>
