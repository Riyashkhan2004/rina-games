<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="history.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <title>Game Score History</title>
    <style>
        body {
            background-color: #f0f0f0;
            font-family: 'Montserrat', sans-serif;
            padding: 20px;
            background-image: url('homeback.jpg');
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        th {
            background-color: #f2f2f2;
        }
        .mini-container {
            position: sticky;
            top: 10px;
            width: 200px;
            padding: 20px;
            background-color: #ffe4e1;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            animation: bloom 5s infinite;
            z-index: 1000; /* Ensure it stays on top */
        }

        @keyframes bloom {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .button-container {
            display: flex;
            gap: 10px;
        }

        .button {
            padding: 10px;
            border: none;
            border-radius: 5px;
            background-color: #ff69b4;
            color: white;
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex; /* Flexbox for icon and text alignment */
            align-items: center; /* Center items vertically */
            justify-content: center; /* Center items horizontally */
        }

        .button:hover {
            background-color: #ff1493;
        }

        .button i {
            margin-right: 5px; /* Space between icon and text */
        }
   

.button i {
  margin-right: 5px; /* Space between icon and text */
}
.auth-buttons {
  display: flex;
  align-items: center;
}

.auth-button {
  background-color: #ffffff; /* Background color for the buttons */
  color: #ff7e5f; /* Text color */
  border: 2px solid #ff7e5f; /* Border color matching the theme */
  border-radius: 5px; /* Rounded corners */
  padding: 10px 15px; /* Padding for the buttons */
  margin-left: 20px; /* Space between the buttons and the search input */
  font-family: 'Montserrat', sans-serif; /* Use the same font as the links */
  font-size: 16px; /* Match the font size */
  cursor: pointer; /* Pointer cursor on hover */
  transition: background 0.3s ease, color 0.3s ease; /* Transition effects */
}

.auth-button:hover {
  background-color: rgba(255, 126, 95, 0.1); /* Light hover effect */
  color: #ffffff; /* Change text color on hover */
}

    </style>
</head>

<body>
    <div class="mini-container">
        <div class="title">Rina</div>
        <div class="button-container">
            <button class="button" onclick="location.href='main2.html'">
                <i class="fa fa-home"></i>
            </button>
            <button class="button" onclick="location.href='search.html'">
                <i class="fa fa-search"></i>
            </button>
        </div>
    </div>
    <h1>Game History</h1>
    <table id="score-history">
        <thead>
            <tr>
                <th>Game Name</th>
                <th>Date</th>
                <th>Time</th>
                <th>Score</th>
            </tr>
        </thead>
        <tbody>
            <!-- History records will be populated here -->
        </tbody>
    </table>
   
   <script>
        function loadHistory() {
            const historyTable = document.getElementById('score-history').getElementsByTagName('tbody')[0];
            const history = JSON.parse(localStorage.getItem('gameHistory')) || [];

            history.forEach(record => {
                const row = historyTable.insertRow();
                row.insertCell(0).textContent = record.name;
                row.insertCell(1).textContent = record.date;
                row.insertCell(2).textContent = record.time;
                row.insertCell(3).textContent = record.score !== null ? record.score : 'N/A';
            });
        }

        document.addEventListener('DOMContentLoaded', loadHistory);
    </script>
</body>
</html>
