<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RINA LOGIN AND SIGNUP</title>
    <link rel="stylesheet" href="signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Add basic styles for error messages */
        body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh; /* Full height of the viewport */
    margin: 0; /* Remove default body margin */
    overflow: hidden; /* Disable scrolling */
}
.wrapper {
    display: flex;
    justify-content: center;
    align-items: center;
    margin-left: -250px; /* Adjust this value as needed */
}



        .error {
            color: red;
            font-size: 0.9em;
        }
        .password-container {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }
        .mini-container {
            position: sticky;
            top: 300px;
            right: 3000px;
            width: 200px;
            padding: 20px;
            background-color: #ff5100;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            animation: bloom 5s infinite;
            /*z-index: 1000;  Ensure it stays on top */
        }

        @keyframes bloom {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .button-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="mini-container">
        <div class="title">Rina</div>
        <div class="button-container">
            <button class="button" onclick="location.href='main.html'">Home</button>
        </div>
    </div>
    <div class="wrapper">
        <div class="card-switch">
            <label class="switch">
                <input type="checkbox" class="toggle">
                <span class="slider"></span>
                <span class="card-side"></span>
                <div class="flip-card__inner">
                    <div class="flip-card__front">
                        <div class="title">Log in</div>
                        <form class="flip-card__form" id="loginForm" action="login.php" method="POST" onsubmit="return validateLogin()">
                            <input class="flip-card__input" name="email" placeholder="Email" type="email" required>
                            <span class="error" id="loginEmailError"></span>
                            <div class="password-container">
                                <input class="flip-card__input" name="password" placeholder="Password" type="password" required minlength="6">
                                <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(event, 'login')"></i>
                            </div>
                            <span class="error" id="loginPasswordError"></span>
                            <button class="flip-card__btn" type="submit">Let's go!</button>
                        </form>
                    </div>
                    <div class="flip-card__back">
                        <div class="title">Sign up</div>
                        <form class="flip-card__form" id="signupForm" action="signup.php" method="POST" onsubmit="return validateSignup()">
                            <input class="flip-card__input" name="name" placeholder="Name" type="text" required>
                            <span class="error" id="signupNameError"></span>
                            <input class="flip-card__input" name="email" placeholder="Email" type="email" required>
                            <span class="error" id="signupEmailError"></span>
                            <div class="password-container">
                                <input class="flip-card__input" name="password" placeholder="Password" type="password" required minlength="6">
                                <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility(event, 'signup')"></i>
                            </div>
                            <span class="error" id="signupPasswordError"></span>
                            <button class="flip-card__btn" type="submit">Confirm!</button>
                        </form>
                    </div>
                </div>
            </label>
        </div>
    </div>

    <script>
        function validateLogin() {
            let valid = true;
            const email = document.forms["loginForm"]["email"].value;
            const password = document.forms["loginForm"]["password"].value;

            // Reset error messages
            document.getElementById("loginEmailError").textContent = "";
            document.getElementById("loginPasswordError").textContent = "";

            if (!email) {
                document.getElementById("loginEmailError").textContent = "Email is required.";
                valid = false;
            }
            if (password.length < 6) {
                document.getElementById("loginPasswordError").textContent = "Password must be at least 6 characters.";
                valid = false;
            }
            return valid;
        }

        function validateSignup() {
            let valid = true;
            const name = document.forms["signupForm"]["name"].value;
            const email = document.forms["signupForm"]["email"].value;
            const password = document.forms["signupForm"]["signupPassword"].value;

            // Reset error messages
            document.getElementById("signupNameError").textContent = "";
            document.getElementById("signupEmailError").textContent = "";
            document.getElementById("signupPasswordError").textContent = "";

            if (!name) {
                document.getElementById("signupNameError").textContent = "Name is required.";
                valid = false;
            }
            if (!email) {
                document.getElementById("signupEmailError").textContent = "Email is required.";
                valid = false;
            }
            if (password.length < 6) {
                document.getElementById("signupPasswordError").textContent = "Password must be at least 6 characters.";
                valid = false;
            }
            return valid;
        }

        function togglePasswordVisibility(event, form) {
            event.stopPropagation(); // Prevent the click from propagating
            const passwordInput = document.querySelector(`input[name='${form === 'login' ? 'password' : 'signupPassword'}']`);
            const toggleIcon = passwordInput.nextElementSibling;

            if (passwordInput.type === "password") {
                passwordInput.type = "text";
                toggleIcon.classList.remove("fa-eye");
                toggleIcon.classList.add("fa-eye-slash");
            } else {
                passwordInput.type = "password";
                toggleIcon.classList.remove("fa-eye-slash");
                toggleIcon.classList.add("fa-eye");
            }
        }
    </script>
</body>
</html>
