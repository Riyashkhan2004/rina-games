<!DOCTYPE html>
<html>
<head>
  <title>Basic Snake HTML Game</title>
  <meta charset="UTF-8">
  <style>
  html, body {
    height: 100%;
    margin: 0;
  }

  body {
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    color: white;
    font-family: Arial, sans-serif;
  }
  
  canvas {
    border: 1px solid white;
  }
  
  #game-over {
    display: none;
    font-size: 24px;
    margin-top: 10px;
  }
  
  #score {
    font-size: 20px;
    margin-bottom: 10px;
  }

  #exit {
    margin-top: 20px;
    padding: 10px 20px;
    background-color: #ff7e5f;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  #exit:hover {
    background-color: #feb47b;
  }
  </style>
</head>
<body>
<canvas width="400" height="400" id="game"></canvas>
<div id="score">Score: 0</div>
<div id="game-over">Game Over! <button id="restart">Restart</button></div>
<button id="exit">Exit Game</button> 

<script>
var canvas = document.getElementById('game');
var context = canvas.getContext('2d');

var grid = 16;
var count = 0;
var score = 0;
var gameOver = false;

var snake = {
  x: 160,
  y: 160,
  dx: grid,
  dy: 0,
  cells: [],
  maxCells: 4
};

var apple = {
  x: 320,
  y: 320
};

function getRandomInt(min, max) {
  return Math.floor(Math.random() * (max - min)) + min;
}

function loop() {
  requestAnimationFrame(loop);
  
  if (gameOver) return;

  if (++count < 4) {
    return;
  }
  count = 0;
  context.clearRect(0, 0, canvas.width, canvas.height);

  snake.x += snake.dx;
  snake.y += snake.dy;

  if (snake.x < 0) {
    snake.x = canvas.width - grid;
  } else if (snake.x >= canvas.width) {
    snake.x = 0;
  }
  if (snake.y < 0) {
    snake.y = canvas.height - grid;
  } else if (snake.y >= canvas.height) {
    snake.y = 0;
  }

  snake.cells.unshift({x: snake.x, y: snake.y});

  if (snake.cells.length > snake.maxCells) {
    snake.cells.pop();
  }

  context.fillStyle = 'red';
  context.fillRect(apple.x, apple.y, grid - 1, grid - 1);

  context.fillStyle = 'green';
  snake.cells.forEach(function(cell, index) {
    context.fillRect(cell.x, cell.y, grid - 1, grid - 1);
    
    if (cell.x === apple.x && cell.y === apple.y) {
      snake.maxCells++;
      score++;
      document.getElementById('score').textContent = 'Score: ' + score;

      apple.x = getRandomInt(0, 25) * grid;
      apple.y = getRandomInt(0, 25) * grid;
    }

    for (var i = index + 1; i < snake.cells.length; i++) {
      if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
        gameOver = true;
        document.getElementById('game-over').style.display = 'block';
      }
    }
  });
}

document.addEventListener('keydown', function(e) {
  if (gameOver) return;

  if (e.which === 37 && snake.dx === 0) {
    snake.dx = -grid;
    snake.dy = 0;
  } else if (e.which === 38 && snake.dy === 0) {
    snake.dy = -grid;
    snake.dx = 0;
  } else if (e.which === 39 && snake.dx === 0) {
    snake.dx = grid;
    snake.dy = 0;
  } else if (e.which === 40 && snake.dy === 0) {
    snake.dy = grid;
    snake.dx = 0;
  }
});

document.getElementById('restart').addEventListener('click', function() {
  gameOver = false;
  score = 0;
  document.getElementById('score').textContent = 'Score: ' + score;
  document.getElementById('game-over').style.display = 'none';
  
  snake = {
    x: 160,
    y: 160,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
  };
  
  apple.x = getRandomInt(0, 25) * grid;
  apple.y = getRandomInt(0, 25) * grid;
  
  requestAnimationFrame(loop);
});

// Exit game function
document.getElementById('exit').addEventListener('click', function() {
  // Store the score with the current date and time
  const history = JSON.parse(localStorage.getItem('gameHistory')) || [];
  const newRecord = {
    name: "Snake",  // Replace with your game's name
    date: new Date().toLocaleDateString(),
    time: new Date().toLocaleTimeString(),
    score: score
  };
  history.push(newRecord);
  localStorage.setItem('gameHistory', JSON.stringify(history));

  // Redirect to the main page
  window.location.href = 'main.html'; // Redirect to your main page
});

// Start the game
requestAnimationFrame(loop);
</script>
</body>
</html>
