    body {

    nav {
      background: linear-gradient(135deg, #ff7e5f, #feb47b); /* Gradient background */
      padding: 15px 30px; /* More padding for a spacious feel */
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2); /* Deeper shadow for more depth */
      border-radius: 10px; /* Rounded corners */
    }

    /* Style for the Rina icon */
    .rina-icon {
      width: 40px; /* Adjust size as needed */
      height: auto; /* Maintain aspect ratio */
      margin-right: 20px; /* Space between icon and the nav links */
      cursor: pointer; /* Change cursor on hover */
      transition: transform 0.3s ease;
    }

    .rina-icon:hover {
      transform: scale(1.1); /* Slightly enlarge icon on hover */
    }

    .nav-links {
      display: flex;
      list-style-type: none;
      margin: 0; /* Remove default margin */
      padding: 0; /* Remove default padding */
    }

    .nav-links li {
      margin-right: 30px; /* Space between links */
    }

    .nav-links li:last-child {
      margin-right: 0; /* Remove margin from the last link */
    }

    nav a {
      color: white; /* Link color */
      font-family: 'Montserrat', sans-serif; /* Modern font */
      font-size: 16px; /* Slightly larger font size */
      font-weight: 600; /* Bold font weight */
      text-decoration: none; /* No underline */
      padding: 10px 15px; /* More padding around links */
      border-radius: 5px; /* Rounded corners for links */
      transition: background 0.3s ease, transform 0.2s ease; /* Smooth transitions */
    }

    nav a:hover {
      background: rgba(255, 255, 255, 0.2); /* Semi-transparent white on hover */
      color: #ff7e5f; /* Change text color on hover */
      transform: scale(1.05); /* Slightly enlarge on hover */
    }

    /* Optional: Mobile responsiveness */
    @media (max-width: 600px) {
      nav {
        flex-direction: column; /* Stack links vertically on small screens */
        align-items: flex-start; /* Align items to the left */
      }

      .nav-links {
        margin-top: 10px; /* Space between navbar and links */
      }

      .nav-links li {
        margin-right: 0; /* Remove horizontal space */
        margin-bottom: 10px; /* Add vertical space */
      }
    }

    .input-container {
      position: relative;
    }

    .input {
      height: 40px;
      padding: 10px 40px 10px 40px; /* Add padding to the left for the icon */
      border: 2px solid black;
      font-size: 14px;
      width: 200px; /* Adjust width as needed */
    }

    .search-icon {
      position: absolute;
      left: 10px; /* Adjust position as needed */
      top: 50%;
      transform: translateY(-50%);
      width: 20px; /* Adjust icon size */
      height: 20px; /* Adjust icon size */
      pointer-events: all; /* Enable interaction */
      cursor: pointer; /* Change cursor on hover */
    }

    .search-icon:hover {
      opacity: 0.7; /* Optional: Change opacity on hover */
    }

    .results {
      border: 1px solid #ccc;
      max-height: 150px;
      overflow-y: auto;
      background: white;
      position: absolute;
      width: 100%;
      display: none;
      z-index: 10;
    }

    .result-item {
      padding: 10px;
      cursor: pointer;
    }

    .result-item:hover {
      background-color: #f0f0f0;
    }

    .more-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-top: 20px;
    }

    .more-button {
      position: relative;
      margin: 15px;
      width: 150px;
      height: 150px;
      border: 3px solid #000000;
      border-radius: 50%;
      overflow: hidden;
      perspective: 1000px;
    }

    .more-button img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>

  <script>
    function fetchGames() {
      const input = document.getElementById('searchInput').value.toLowerCase();
      const resultsContainer = document.getElementById('results');

      // Simulated game data
      const sampleData = [
        { name: 'Tetris', link: 'colortetris.html' },
        { name: 'ColorTertris', link: 'colortetris.html' },
        { name: 'Crossyroad', link: 'crossroad.html' },
        { name: 'Snake', link: 'snake.html' },
        { name: 'MemoryFlip', link: 'memory.html' },
        { name: 'BomberMan', link: 'bomberman.html' },
        { name: 'PingPong', link: 'pong.html' },
        { name: 'TicTacToe', link: 'tictactoe.html' },
        { name: 'MissileCommand', link: 'missile.html' },
        { name: 'BubbleShooter', link: 'bubbleshooter.html' }
      ];

      // Check if input matches any game
      const matchedGame = sampleData.find(game => game.name.toLowerCase() === input);

      if (matchedGame) {
        window.location.href = matchedGame.link; // Redirect to the matched game's link
      } else {
        // Filter games based on input for suggestions
        const filteredGames = sampleData.filter(game =>
          game.name.toLowerCase().includes(input)
        );

        // Sort to bring the searched game to the top
        const sortedGames = filteredGames.sort((a, b) => {
          return a.name.toLowerCase().indexOf(input) - b.name.toLowerCase().indexOf(input);
        });

        resultsContainer.innerHTML = '';
        sortedGames.forEach(game => {
          const div = document.createElement('div');
          div.classList.add('result-item');
          div.textContent = game.name;
          div.onclick = () => window.location.href = game.link;
          resultsContainer.appendChild(div);
        });

        resultsContainer.style.display = sortedGames.length > 0 ? 'block' : 'none';
      }
    }

    document.getElementById('searchInput').addEventListener('keypress', function (event) {
      if (event.key === 'Enter') {
        fetchGames();
      }
    });
  </script>
